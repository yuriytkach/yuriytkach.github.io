<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 133" fill="none">
  <!-- Coffee grinder icon -->
  <g transform="translate(133, 10) scale(0.82)" stroke="#3a5a50" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Crank arm -->
    <line x1="18" y1="3.5" x2="37" y2="-1" />
    <!-- Crank end knob -->
    <circle cx="39.5" cy="-1.5" r="2.5" />
    <!-- Crank pivot on top of bowl -->
    <circle cx="17" cy="4" r="2.5" />
    <!-- Horizontal rim line at top of bowl -->
    <line x1="5" y1="10.5" x2="29" y2="10.5" />
    <!-- Bowl / hopper -->
    <path d="M5 10.5 Q5 18 17 18 Q29 18 29 10.5" />
    <!-- Narrow collar under bowl -->
    <rect x="10" y="18.5" width="14" height="3" rx="0.3" />
    <!-- Flared shelf -->
    <path d="M2 24 L32 24 L27.5 21.5 L6.5 21.5 Z" />
    <!-- Main body -->
    <rect x="4" y="24" width="26" height="28" rx="0.8" />
    <!-- Inset drawer -->
    <rect x="7.5" y="33" width="19" height="14" rx="0.8" />
    <!-- Drawer knob -->
    <circle cx="17" cy="40" r="1.3" />
  </g>
  <!-- Main title - Georgia serif, lighter appearance -->
  <text x="150" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="normal" fill="#3a5a50" letter-spacing="0.5">Software Developer</text>
  <!-- Subtitle -->
  <text x="150" y="107" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" font-weight="normal" fill="#7a9e94" letter-spacing="0.8">Java, Quarkus, Cloud...</text>
</svg>
